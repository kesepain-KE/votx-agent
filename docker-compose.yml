version: "3.8"

services:
  votx-agent:
    build: .
    container_name: votx-agent
    ports:
      - "1478:1478"
    volumes:
      - ./users:/app/users          # 用户数据持久化
      - ./message-runtime:/app/message-runtime  # 外部消息路由配置与推送队列
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - PORT=1478
      - VOTX_HOST=0.0.0.0
      - VOTX_MESSAGE_CONFIG=/app/message-runtime/config.json
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
