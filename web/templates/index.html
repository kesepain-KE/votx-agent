<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>votx-agent</title>
  <style>
    /* =============================================
       Design System — CSS Custom Properties
       ============================================= */

    /* 高级黑 (default) */
    :root {
      --bg-root: #000000;
      --bg-soft: #0a0a0a;
      --glass-bg: rgba(255, 255, 255, 0.04);
      --glass-bg-hover: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-border-hover: rgba(255, 255, 255, 0.18);
      --glass-shine: rgba(255, 255, 255, 0.06);

      --text-primary: #f5f5f5;
      --text-secondary: #999999;
      --text-tertiary: #666666;

      --accent: #ffffff;
      --accent-dim: #cccccc;
      --accent-glow: rgba(255, 255, 255, 0.2);
      --accent-2: #e0e0e0;
      --accent-2-glow: rgba(255, 255, 255, 0.15);

      --danger: #cc5555;
      --danger-bg: rgba(204, 85, 85, 0.10);
      --success: #999999;
      --warning: #aaaaaa;

      --shadow-panel: 0 24px 80px rgba(0, 0, 0, 0.55);
      --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.30);
      --shadow-button: 0 8px 24px rgba(255, 255, 255, 0.06);

      --r-xs: 8px; --r-sm: 12px; --r-md: 16px; --r-lg: 24px; --r-full: 999px;
      --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px; --s-5: 20px; --s-6: 24px;

      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --duration: 0.25s; --duration-slow: 0.5s;

      --font-sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    /* 高级白 */
    body[data-theme="light"] {
      --bg-root: #ffffff;
      --bg-soft: #fafafa;
      --glass-bg: rgba(255, 255, 255, 0.70);
      --glass-bg-hover: rgba(255, 255, 255, 0.88);
      --glass-border: rgba(0, 0, 0, 0.07);
      --glass-border-hover: rgba(0, 0, 0, 0.18);
      --glass-shine: rgba(255, 255, 255, 0.80);

      --text-primary: #0a0a0a;
      --text-secondary: #777777;
      --text-tertiary: #aaaaaa;

      --accent: #0a0a0a;
      --accent-dim: #333333;
      --accent-glow: rgba(0, 0, 0, 0.10);
      --accent-2: #1a1a1a;
      --accent-2-glow: rgba(0, 0, 0, 0.08);

      --danger: #cc4444;
      --danger-bg: rgba(204, 68, 68, 0.06);
      --success: #666666;
      --warning: #888888;

      --shadow-panel: 0 20px 60px rgba(0, 0, 0, 0.06);
      --shadow-card: 0 4px 16px rgba(0, 0, 0, 0.04);
      --shadow-button: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    /* =============================================
       Reset & Base
       ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh; overflow: hidden;
      color: var(--text-primary);
      font-family: var(--font-sans);
      background: var(--bg-root);
      transition: background var(--duration-slow) var(--ease-out),
                  color var(--duration-slow) var(--ease-out);
    }

    body::before {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(680px 420px at 8% 6%, rgba(255,255,255,0.06), transparent 60%),
        radial-gradient(580px 380px at 92% 14%, rgba(255,255,255,0.04), transparent 58%),
        radial-gradient(520px 360px at 22% 90%, rgba(255,255,255,0.03), transparent 62%),
        radial-gradient(560px 400px at 78% 82%, rgba(255,255,255,0.04), transparent 60%);
      transition: opacity var(--duration-slow) var(--ease-out);
    }

    body[data-theme="light"]::before {
      background:
        radial-gradient(680px 420px at 8% 6%, rgba(0,0,0,0.03), transparent 60%),
        radial-gradient(580px 380px at 92% 14%, rgba(0,0,0,0.02), transparent 58%),
        radial-gradient(520px 360px at 22% 90%, rgba(0,0,0,0.025), transparent 62%),
        radial-gradient(560px 400px at 78% 82%, rgba(0,0,0,0.02), transparent 60%);
      opacity: 0.7;
    }

    body::after {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(127, 127, 127, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127, 127, 127, 0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 50% 30%, #000 0%, transparent 75%);
      opacity: 0.45;
    }

    /* ========== Layout ========== */
    .app {
      position: relative; z-index: 1;
      width: min(1600px, calc(100vw - 48px));
      height: min(calc(100vh - 48px), calc((100vw - 48px) * 0.62));
      margin: 24px auto;
      display: grid;
      grid-template-columns: 272px 1fr 388px;
      gap: 10px;
    }
    @media (min-aspect-ratio: 16/10) {
      .app { height: calc(100vh - 48px); }
    }

    /* ========== Glass Panel ========== */
    .glass {
      position: relative;
      display: flex; flex-direction: column;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-lg);
      backdrop-filter: blur(32px) saturate(1.5);
      -webkit-backdrop-filter: blur(32px) saturate(1.5);
      box-shadow: var(--shadow-panel), inset 0 1px 0 var(--glass-shine);
      overflow: hidden;
      transition: background var(--duration-slow) var(--ease-out),
                  border-color var(--duration-slow) var(--ease-out),
                  box-shadow var(--duration-slow) var(--ease-out);
    }

    .glass::before {
      content: "";
      position: absolute; inset: 0; pointer-events: none; z-index: 0;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);
      transition: opacity var(--duration-slow) var(--ease-out);
    }

    body[data-theme="light"] .glass::before {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.50);
    }

    .glass > * { position: relative; z-index: 2; }

    /* ========== Sidebar ========== */
    .sidebar {
      padding: var(--s-5); gap: 14px; display: flex; flex-direction: column;
      box-shadow: 0 0 40px rgba(255,255,255,0.08), 0 0 80px rgba(255,255,255,0.04), 0 0 120px rgba(255,255,255,0.02);
    }
    body[data-theme="light"] .sidebar {
      box-shadow: 0 0 40px rgba(0,0,0,0.08), 0 0 80px rgba(0,0,0,0.04), 0 0 120px rgba(0,0,0,0.02);
    }
    .brand { display: flex; gap: var(--s-3); align-items: center; }

    .logo {
      width: 44px; height: 44px; flex-shrink: 0;
      border-radius: 16px;
      background: linear-gradient(135deg, #ffffff, #aaaaaa);
      display: grid; place-items: center;
      font-weight: 950; font-size: 20px; color: #000;
      box-shadow: 0 0 20px rgba(255,255,255,0.10);
    }

    .brand h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.2px; }
    .brand p { font-size: 12px; color: var(--text-secondary); }

    .section-title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.6px;
      color: var(--text-tertiary);
      display: flex; align-items: center; gap: 7px;
      margin: 2px 0 6px;
    }

    .section-title::before {
      content: "";
      display: inline-block;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-primary);
      flex-shrink: 0;
    }

    .section-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: var(--s-2); margin: 2px 0 6px;
    }

    .card {
      padding: var(--s-3); border-radius: var(--r-md);
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.03);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.04);
      transition: border-color var(--duration) var(--ease-out);
    }

    .stat {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px;
      padding: 10px 12px; border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.025);
      margin-bottom: 8px;
      transition: border-color var(--duration) var(--ease-out);
    }

    .stat:hover { border-color: var(--glass-border-hover); }
    .ok { color: var(--success); font-weight: 800; }

    /* Conv list */
    .conv-list { display: grid; gap: 6px; max-height: 260px; overflow-y: auto; }

    .conv {
      position: relative;
      padding: 10px 66px 10px 11px;
      border-radius: var(--r-sm);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: background var(--duration) var(--ease-out),
                  border-color var(--duration) var(--ease-out),
                  transform var(--duration) var(--ease-out);
    }

    .conv:hover {
      background: var(--glass-bg-hover);
      border-color: var(--glass-border-hover);
      transform: translateY(-1px);
    }

    .conv.active {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.22);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    body[data-theme="light"] .conv.active {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.18);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
    }

    .conv b { font-size: 12px; font-weight: 600; }
    .conv p { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
    .conv .ci-summary { color: var(--text-secondary); font-size: 10px; margin-top: 3px; opacity: 0.7; }

    .conv-actions {
      position: absolute; right: 6px; top: 50%;
      transform: translateY(-50%);
      display: flex; gap: 4px; opacity: 0;
      transition: opacity var(--duration) var(--ease-out);
    }

    .conv:hover .conv-actions { opacity: 1; }

    .icon-btn, .tiny-btn {
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary);
      border-radius: var(--r-xs);
      cursor: pointer;
      transition: all var(--duration) var(--ease-out);
      font-family: var(--font-sans);
    }

    .icon-btn {
      width: 26px; height: 26px; font-size: 13px;
      display: inline-flex; align-items: center; justify-content: center;
    }

    .tiny-btn { padding: 4px 8px; font-size: 11px; }

    .icon-btn:hover, .tiny-btn:hover {
      color: var(--text-primary);
      border-color: var(--glass-border-hover);
      background: rgba(255,255,255,0.06);
    }

    body[data-theme="light"] .icon-btn:hover,
    body[data-theme="light"] .tiny-btn:hover { background: rgba(0,0,0,0.04); }

    .icon-btn.danger:hover, .tiny-btn.danger:hover {
      color: var(--danger); border-color: var(--danger);
      background: var(--danger-bg);
    }

    .mini-actions { display: flex; gap: 5px; }

    .profile {
      margin-top: auto;
      display: flex; gap: 10px; align-items: center;
      padding: var(--s-3); border-radius: var(--r-md);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.025);
    }

    .avatar {
      width: 34px; height: 34px; flex-shrink: 0;
      border-radius: 50%;
      background: #ffffff;
      display: grid; place-items: center;
      color: #000; font-weight: 800; font-size: 14px;
    }

    body[data-theme="light"] .avatar { background: #0a0a0a; color: #fff; }

    .profile-with-theme {
      display: grid; grid-template-columns: auto 1fr auto;
      align-items: center; gap: 10px;
    }

    .theme-toggle {
      justify-self: end; min-width: 56px;
      padding: 6px 12px; border-radius: var(--r-full);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-primary);
      font-size: 12px; font-family: var(--font-sans);
      cursor: pointer;
      transition: all var(--duration) var(--ease-out);
    }

    .theme-toggle:hover {
      border-color: var(--glass-border-hover);
      background: rgba(255,255,255,0.06);
    }

    body[data-theme="light"] .theme-toggle:hover { background: rgba(0,0,0,0.04); }

    .refresh-btn {
      width: 30px; height: 30px; flex-shrink: 0;
      border-radius: 50%; border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--text-secondary); cursor: pointer;
      font-size: 14px; display: grid; place-items: center;
      transition: all var(--duration) var(--ease-out);
    }
    .refresh-btn:hover {
      border-color: var(--glass-border-hover);
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }
    .refresh-btn:active { transform: scale(0.92); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-btn.spinning { animation: spin 0.6s ease-in-out; pointer-events: none; }

    /* ========== Forms ========== */
    select, input, textarea {
      font-family: var(--font-sans); font-size: 13px;
      color: var(--text-primary);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      outline: none;
      transition: border-color var(--duration) var(--ease-out),
                  box-shadow var(--duration) var(--ease-out);
    }

    select:focus, input:focus, textarea:focus {
      border-color: rgba(255,255,255,0.25);
    }

    body[data-theme="light"] select:focus,
    body[data-theme="light"] input:focus,
    body[data-theme="light"] textarea:focus { border-color: rgba(0,0,0,0.25); }

    select { width: 100%; padding: 8px 10px; margin-bottom: 8px; cursor: pointer; }
    select option { background: var(--bg-soft); color: var(--text-primary); }

    /* ========== Buttons ========== */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      border: 0; border-radius: var(--r-sm);
      padding: 9px 14px;
      font-weight: 700; font-size: 13px; font-family: var(--font-sans);
      cursor: pointer;
      transition: all var(--duration) var(--ease-out);
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-primary {
      background: #ffffff;
      color: #000000; width: 100%;
      box-shadow: 0 8px 24px rgba(255,255,255,0.06);
    }

    body[data-theme="light"] .btn-primary {
      background: #0a0a0a;
      color: #ffffff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .btn-primary:hover { filter: brightness(1.05); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-ghost {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.08);
      border-color: var(--glass-border-hover);
    }

    .btn-danger {
      background: var(--danger-bg);
      border: 1px solid rgba(204,85,85,0.2);
      color: #cc8888;
    }

    body[data-theme="light"] .btn-danger {
      border-color: rgba(204,68,68,0.15);
      color: #994444;
    }

    .btn-danger:hover { border-color: var(--danger); }
    .btn.mini, .btn-mini { padding: 6px 12px; font-size: 12px; border-radius: 10px; }
    .btn.small { padding: 6px 10px; font-size: 11px; border-radius: 9px; }

    /* ========== Main Chat ========== */
    .main { display: grid; grid-template-rows: auto 1fr auto; }

    .top {
      padding: 15px 20px;
      border-bottom: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    body[data-theme="light"] .top {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
    }

    .top h2 { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .top p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .top-actions { display: flex; align-items: center; gap: 8px; }

    .model-badge {
      display: flex; gap: 7px; align-items: center;
      padding: 7px 12px; border-radius: var(--r-full);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 12px; color: var(--text-secondary);
    }

    body[data-theme="light"] .model-badge {
      background: rgba(0,0,0,0.03);
      border-color: rgba(0,0,0,0.10);
    }

    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 14px var(--accent-glow);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .chat {
      padding: 18px 22px;
      overflow-y: auto; display: flex;
      flex-direction: column; gap: 14px;
    }

    .msg {
      display: flex; gap: 10px; max-width: 86%;
      animation: rise 0.3s var(--ease-out) both;
    }

    .msg.me { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; flex-shrink: 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      display: grid; place-items: center;
      font-size: 14px;
      box-shadow: var(--shadow-card);
    }

    .bubble {
      padding: 12px 15px; border-radius: 18px;
      font-size: 14px; line-height: 1.65;
      white-space: pre-wrap; word-wrap: break-word;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .bubble-wrap {
      display: flex; flex-direction: column; gap: 3px;
    }
    .msg.me .bubble-wrap { align-items: flex-end; }
    .copy-msg {
      height: 22px; padding: 0 8px; border-radius: 6px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      color: var(--text-tertiary); cursor: pointer;
      font-size: 11px; display: grid; place-items: center;
      opacity: 0.4; transition: opacity 0.15s var(--ease-out);
      font-family: var(--font-sans);
    }
    .copy-msg:hover {
      opacity: 1;
      border-color: var(--glass-border-hover);
      color: var(--text-primary);
    }
    .copy-msg.copied { opacity: 1; color: var(--success); }

    .msg.me .bubble {
      background: rgba(255,255,255,0.88);
      border-color: rgba(255,255,255,0.18);
      color: #000000;
    }

    body[data-theme="light"] .msg.me .bubble {
      background: rgba(0,0,0,0.88);
      border-color: rgba(0,0,0,0.14);
      color: #ffffff;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }

    .sys-msg { text-align: center; color: var(--text-secondary); font-size: 12px; padding: 6px; font-style: italic; }
    .sys-error { color: var(--danger); font-size: 12px; padding: 6px; }
    .sys-warn { color: var(--warning); font-size: 12px; padding: 6px; }

    /* Token stats */
    .token-row {
      margin-top: 6px; display: flex; gap: 5px; flex-wrap: wrap;
      align-items: center; justify-content: space-between;
      font: 10px/1.4 var(--font-mono);
      color: var(--text-tertiary);
    }
    .token-row .token-left { display: flex; gap: 5px; flex-wrap: wrap; }

    .token-row span {
      padding: 3px 7px; border-radius: var(--r-full);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      transition: background var(--duration) var(--ease-out),
                  border-color var(--duration) var(--ease-out);
    }

    .token-row span:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.14);
    }

    body[data-theme="light"] .token-row span:hover {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.12);
    }

    /* Thinking block */
    .think-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; margin-top: 6px;
      overflow: hidden;
      transition: border-color var(--duration) var(--ease-out);
    }
    .think-block.open { border-color: rgba(255,255,255,0.16); }
    .think-header {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 12px; font-size: 12px; cursor: pointer; user-select: none;
      color: var(--text-secondary);
      transition: background var(--duration) var(--ease-out);
    }
    .think-header:hover { background: rgba(255,255,255,0.02); }
    .think-body {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 9px 12px;
      font: 11px/1.6 var(--font-mono);
      color: var(--text-secondary);
      white-space: pre-wrap;
      max-height: 200px; overflow-y: auto;
    }
    .think-block.open .think-body { display: block; }

    /* Tool calls */
    .tool-call {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; margin-top: 6px;
      overflow: hidden;
      transition: border-color var(--duration) var(--ease-out);
    }

    .tool-call.open { border-color: rgba(255,255,255,0.16); }
    body[data-theme="light"] .tool-call.open { border-color: rgba(0,0,0,0.14); }

    .tc-header {
      display: flex; gap: 8px; align-items: center;
      padding: 8px 12px; font-size: 12px;
      cursor: pointer; user-select: none;
      transition: background var(--duration) var(--ease-out);
    }

    .tc-header:hover { background: rgba(255,255,255,0.02); }

    .tc-name {
      color: var(--text-primary);
      font-family: var(--font-mono); font-weight: 700;
    }

    .tc-status { font-size: 11px; font-weight: 700; }
    .tc-status.ok { color: var(--success); }
    .tc-status.fail { color: var(--danger); }

    .tc-param {
      color: var(--text-secondary); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: var(--font-mono); font-size: 11px;
    }

    .tc-time { color: var(--text-tertiary); font-size: 11px; }

    .tc-detail {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 9px 12px;
      font: 11px/1.6 var(--font-mono);
      color: var(--text-secondary);
      white-space: pre-wrap;
      max-height: 200px; overflow-y: auto;
    }

    .tool-call.open .tc-detail { display: block; }

    /* Composer */
    .composer {
      padding: 14px 18px;
      border-top: 1px solid var(--glass-border);
      box-shadow: 0 -16px 48px rgba(0,0,0,0.14);
    }

    body[data-theme="light"] .composer { box-shadow: 0 -16px 48px rgba(0,0,0,0.05); }

    .quick { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 10px; }

    .chip {
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
      border-radius: var(--r-full);
      padding: 6px 11px; font-size: 12px;
      cursor: pointer; font-family: var(--font-sans);
      transition: all var(--duration) var(--ease-out);
    }

    .chip:hover {
      color: var(--text-primary);
      border-color: var(--glass-border-hover);
      background: rgba(255,255,255,0.04);
    }

    body[data-theme="light"] .chip:hover { background: rgba(0,0,0,0.03); }

    .chip:focus-visible, .btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .input-row {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 8px; padding: 7px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      align-items: center;
      transition: border-color var(--duration) var(--ease-out);
    }

    .input-row:focus-within {
      border-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    body[data-theme="light"] .input-row:focus-within {
      border-color: rgba(0,0,0,0.20);
      box-shadow: 0 0 0 3px rgba(0,0,0,0.04);
    }

    .input-row input, .input-row textarea {
      border: 0; background: transparent;
      outline: 0; padding: 0 8px;
      font-size: 14px; color: var(--text-primary);
    }

    .input-row input::placeholder, .input-row textarea::placeholder { color: var(--text-tertiary); }
    .input-row input:disabled, .input-row textarea:disabled { opacity: 0.4; }

    .attach-chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: var(--r-full);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      font-size: 12px; color: var(--text-primary);
      transition: all var(--duration) var(--ease-out);
    }
    .attach-chip:hover { border-color: var(--glass-border-hover); }
    .attach-chip .remove-file {
      cursor: pointer; font-weight: 700; color: var(--text-secondary);
      font-size: 14px; margin-left: 2px;
    }
    .attach-chip .remove-file:hover { color: var(--danger); }

    .upload-btn {
      border: 0; border-radius: 11px; padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      cursor: pointer; font-size: 15px;
      transition: all var(--duration) var(--ease-out);
    }

    .upload-btn:hover {
      color: var(--text-primary);
      border-color: var(--glass-border-hover);
    }

    .send-btn {
      border: 0; border-radius: 11px;
      padding: 9px 18px;
      background: #ffffff;
      color: #000000; font-weight: 800;
      cursor: pointer; font-size: 13px; font-family: var(--font-sans);
      box-shadow: 0 8px 22px rgba(255,255,255,0.08);
      transition: all var(--duration) var(--ease-out);
    }

    body[data-theme="light"] .send-btn {
      background: #0a0a0a;
      color: #ffffff;
      box-shadow: 0 8px 22px rgba(0,0,0,0.08);
    }

    .send-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: none; transform: none; }

    /* ========== Right Panel ========== */
    .right {
      display: grid; grid-template-rows: auto 1fr;
      box-shadow: 0 0 40px rgba(255,255,255,0.08), 0 0 80px rgba(255,255,255,0.04), 0 0 120px rgba(255,255,255,0.02);
    }
    body[data-theme="light"] .right {
      box-shadow: 0 0 40px rgba(0,0,0,0.08), 0 0 80px rgba(0,0,0,0.04), 0 0 120px rgba(0,0,0,0.02);
    }

    .panel-head { padding: 16px 18px; border-bottom: 1px solid var(--glass-border); }

    .panel-head h3 {
      font-size: 14px; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }

    /* live badge removed */

    .tabs {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 6px; margin-top: 12px;
    }

    .tab {
      border: 1px solid var(--glass-border);
      border-radius: var(--r-sm);
      padding: 7px 4px; font-size: 12px; text-align: center;
      cursor: pointer; font-family: var(--font-sans);
      background: rgba(255,255,255,0.02);
      color: var(--text-secondary);
      transition: all var(--duration) var(--ease-out);
    }

    .tab:hover {
      color: var(--text-primary);
      border-color: var(--glass-border-hover);
    }

    .tab.active {
      background: #ffffff;
      color: #000000; border-color: transparent;
      font-weight: 800;
    }

    body[data-theme="light"] .tab.active {
      background: #0a0a0a;
      color: #ffffff;
    }

    .panel-body { padding: 16px; overflow-y: auto; }

    .pane { display: none; }
    .pane.active { display: block; }

    /* Overview: prompt tabs */
    .prompt-tabs {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 6px; margin-bottom: 12px;
    }

    .prompt-tab {
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      background: rgba(255,255,255,0.02);
      color: var(--text-secondary);
      font-size: 11px; font-family: var(--font-sans);
      padding: 7px 5px; cursor: pointer; text-align: center;
      transition: all var(--duration) var(--ease-out);
    }

    .prompt-tab:hover {
      color: var(--text-primary);
      border-color: var(--glass-border-hover);
    }

    .prompt-tab.active {
      background: #ffffff;
      color: #000000; font-weight: 800;
    }

    body[data-theme="light"] .prompt-tab.active {
      background: #0a0a0a;
      color: #ffffff;
    }

    .mono {
      font: 11px/1.7 var(--font-mono);
      background: rgba(0,0,0,0.15);
      border: 1px solid var(--glass-border);
      border-radius: 15px; padding: 12px;
      color: var(--text-secondary);
      white-space: pre-wrap;
    }

    body[data-theme="light"] .mono { background: rgba(0,0,0,0.03); }

    /* Debug */
    .debug-grid { display: grid; gap: 10px; }

    .toggle-card {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 13px; border-radius: 14px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--glass-border);
      transition: all var(--duration) var(--ease-out);
      box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .toggle-card:hover {
      border-color: var(--glass-border-hover);
      transform: translateY(-1px);
    }

    .toggle-card b { font-size: 13px; }
    .toggle-card p { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    .switch {
      width: 46px; height: 25px; flex-shrink: 0;
      border-radius: var(--r-full);
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--glass-border);
      position: relative; cursor: pointer;
      transition: all var(--duration) var(--ease-out);
    }

    .switch::after {
      content: ""; position: absolute;
      width: 19px; height: 19px; border-radius: 50%;
      top: 2px; left: 2px;
      background: var(--text-secondary);
      transition: all var(--duration) var(--ease-out);
    }

    .switch.on {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.25);
    }

    body[data-theme="light"] .switch.on {
      background: rgba(0,0,0,0.08);
      border-color: rgba(0,0,0,0.20);
    }

    .switch.on::after {
      left: 23px;
      background: #ffffff;
    }

    body[data-theme="light"] .switch.on::after { background: #0a0a0a; }

    /* Form rows */
    .form-row { display: grid; gap: 5px; }

    .form-row label {
      font-size: 11px; font-weight: 600;
      color: var(--text-secondary);
    }

    .form-row input, .form-row textarea {
      width: 100%; padding: 9px 11px;
      border-radius: 10px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      font-family: var(--font-sans); font-size: 13px;
    }

    .key-shell { display: flex; gap: 7px; }
    .key-shell input { flex: 1; }
    .key-hint { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }

    /* Lists */
    .list { display: grid; gap: 8px; }

    .item {
      padding: 12px 13px; border-radius: 15px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--glass-border);
      transition: all var(--duration) var(--ease-out);
    }

    .item:hover {
      border-color: var(--glass-border-hover);
      transform: translateY(-1px);
      background: var(--glass-bg-hover);
    }

    .item-top {
      display: flex; justify-content: space-between;
      gap: 8px; font-size: 13px;
    }

    .item p { font-size: 11px; color: var(--text-secondary); line-height: 1.45; margin-top: 4px; }

    .pill {
      padding: 3px 8px; border-radius: var(--r-full);
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary); font-size: 10px; font-weight: 600;
      flex-shrink: 0;
    }

    body[data-theme="light"] .pill { background: rgba(0,0,0,0.05); }

    /* Logs */
    .log-row {
      font: 11px/1.55 var(--font-mono);
      border-left: 3px solid var(--text-secondary);
      padding: 8px 10px;
      background: rgba(255,255,255,0.02);
      border-radius: 10px;
      color: var(--text-secondary);
      transition: all var(--duration) var(--ease-out);
    }

    .log-row:hover {
      background: var(--glass-bg-hover);
      transform: translateX(2px);
    }

    .log-row.fail { border-left-color: var(--danger); }

    /* Files */
    .file-toolbar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 6px; margin-bottom: 10px;
    }

    .file-actions { display: flex; gap: 6px; margin-top: 6px; }
    .file-select { display: flex; align-items: center; gap: 8px; }
    .file-check { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }

    /* Context menu */
    .ctx-menu {
      position: fixed; display: none; z-index: 99;
      min-width: 140px; padding: 6px;
      border-radius: var(--r-sm);
      background: var(--bg-soft);
      border: 1px solid var(--glass-border);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .ctx-menu button {
      width: 100%; text-align: left;
      border: 0; background: transparent;
      color: var(--text-primary);
      padding: 8px 10px; border-radius: var(--r-xs);
      cursor: pointer; font-size: 12px; font-family: var(--font-sans);
      transition: background var(--duration) var(--ease-out);
    }

    .ctx-menu button:hover { background: rgba(255,255,255,0.06); }
    .ctx-menu .danger { color: var(--danger); }

    /* Toast */
    .toast {
      position: fixed; right: 24px; bottom: 24px; z-index: 120;
      padding: 12px 18px; border-radius: 14px;
      background: var(--bg-soft);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: var(--shadow-panel);
      color: var(--text-primary); font-size: 13px;
      opacity: 0; transform: translateY(12px);
      transition: all var(--duration) var(--ease-out);
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.20); }

    /* Selection */
    ::selection { background: rgba(255,255,255,0.15); color: var(--text-primary); }
    body[data-theme="light"] ::selection { background: rgba(0,0,0,0.10); }

    /* Focus */
    :focus-visible {
      outline: 2px solid rgba(255,255,255,0.4);
      outline-offset: 2px;
    }

    body[data-theme="light"] :focus-visible { outline-color: rgba(0,0,0,0.4); }

    input:focus-visible, textarea:focus-visible, select:focus-visible {
      outline: none;
      border-color: rgba(255,255,255,0.25);
    }

    body[data-theme="light"] input:focus-visible,
    body[data-theme="light"] textarea:focus-visible,
    body[data-theme="light"] select:focus-visible { border-color: rgba(0,0,0,0.25); }

    /* Micro edge gloss */
    .card, .stat, .conv, .item, .toggle-card, .bubble, .log-row {
      position: relative; overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    body[data-theme="light"] .card, body[data-theme="light"] .stat,
    body[data-theme="light"] .conv, body[data-theme="light"] .item,
    body[data-theme="light"] .toggle-card, body[data-theme="light"] .bubble,
    body[data-theme="light"] .log-row {
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.5);
    }

    body::after{
      background:
        radial-gradient(420px 260px at 12% 0%, rgba(255,255,255,0.04), transparent 70%),
        radial-gradient(520px 300px at 90% 12%, rgba(255,255,255,0.03), transparent 72%),
        linear-gradient(180deg, transparent, rgba(0,0,0,0.10));
    }

    .glass::after {
      content: "";
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
      border-radius: inherit;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 0 0 1px rgba(255,255,255,0.06);
    }

    body[data-theme="light"] .glass::after {
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.6),
        inset 0 0 0 1px rgba(0,0,0,0.06);
    }

    /* Responsive */
    @media (max-width: 1160px) {
      .app { grid-template-columns: 250px 1fr; }
      .right { display: none; }
    }

    @media (max-width: 760px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .top { align-items: flex-start; flex-direction: column; }
      .top-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar glass">
    <div class="brand"><div class="logo">V</div><div><h1>votx-agent</h1><p>本地多用户 Agent 控制台</p></div></div>
    <div class="card">
      <div class="section-title">用户选择</div>
      <select id="user-select"></select>
      <button class="btn btn-primary" onclick="selectUser()">进入</button>
      <div style="color:var(--danger);font-size:11px;margin-top:6px" id="select-err"></div>
    </div>
    <div>
      <div class="section-title">状态</div>
      <div class="stat"><span>历史消息</span><b id="stat-msg-count">—</b></div>
      <div class="stat"><span>工具调用</span><b id="stat-tool-count">—</b></div>
      <div class="stat"><span>会话大小</span><b id="stat-file-size">—</b></div>
    </div>
    <div class="section-row">
      <div class="section-title">对话历史</div>
      <div class="mini-actions">
        <button class="tiny-btn" onclick="refreshConversations()">刷新</button>
        <button class="tiny-btn danger" onclick="deleteAllConvs()">全部删除</button>
      </div>
    </div>
    <div class="conv-list" id="conv-list"><div style="color:var(--text-secondary);font-size:11px;padding:4px">选择用户后加载…</div></div>
    <div class="section-row" style="margin-bottom:8px">
      <div class="section-title">状态刷新</div>
      <button class="refresh-btn" id="refresh-btn" type="button" title="刷新右侧栏所有数据" onclick="refreshOverview()">↻</button>
    </div>
    <div class="profile card profile-with-theme">
      <div class="avatar" id="profile-avatar">K</div>
      <div><b id="profile-name">未连接</b><br><span style="font-size:11px;color:var(--text-secondary)" id="profile-info">选择用户开始</span></div>
      <button class="theme-toggle" id="theme-toggle" type="button">浅色</button>
    </div>
  </aside>

  <!-- Main Chat -->
  <main class="main glass" id="main-panel">
    <div class="drop-overlay" id="drop-overlay" style="position:absolute;inset:0;background:rgba(124,111,247,0.06);border:2px dashed rgba(255,255,255,0.12);border-radius:24px;display:none;align-items:center;justify-content:center;z-index:10;pointer-events:none">
      <span style="background:rgba(255,255,255,0.06);padding:16px 32px;border-radius:16px;font-size:16px">📂 释放文件上传</span>
    </div>
    <header class="top">
      <div><h2 id="chat-title">对话闭环与工具调用</h2><p id="main-sub">选择用户后开始对话</p></div>
      <div class="top-actions">
        <div class="model-badge"><span class="pulse" id="status-dot" style="display:none"></span><span id="model-name">—</span></div>
        <button class="btn btn-ghost mini" onclick="saveChat()">保存</button>
        <button class="btn btn-ghost mini" onclick="newChat()">新对话</button>
      </div>
    </header>
    <div class="chat" id="chat"></div>
    <footer class="composer">
      <div class="quick">
        <button class="chip" data-cmd="/clear">/clear</button>
        <button class="chip" data-cmd="/history">/history</button>
        <button class="chip" data-cmd="/retry">/retry</button>
        <button class="chip" data-cmd="/help">/help</button>
      </div>
      <div class="attach-chips" id="attach-chips" style="display:none;display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px"></div>
      <div class="input-row">
        <input type="file" id="upload-input" multiple onchange="uploadFiles(this.files,'file')" accept="*/*" style="display:none">
        <button class="upload-btn" onclick="document.getElementById('upload-input').click()" title="上传文件">↑</button>
        <textarea id="user-input" placeholder="输入消息或 / 命令... (Enter 发送, Shift+Enter 换行)" autofocus rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" style="resize:none;overflow-y:auto;min-height:22px;max-height:150px;line-height:1.5;border:0;background:transparent;outline:0;padding:0 8px;font-size:14px;color:var(--text-primary);font-family:var(--font-sans);width:100%"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">发送</button>
      </div>
    </footer>
  </main>

  <!-- Right Panel -->
  <aside class="right glass">
    <div class="panel-head"><h3>项目状态</h3>
      <div class="tabs">
        <button class="tab active" data-tab="overview">概览</button>
        <button class="tab" data-tab="debug">调试</button>
        <button class="tab" data-tab="logs">日志</button>
        <button class="tab" data-tab="files">文件</button>
      </div>
    </div>
    <div class="panel-body">
      <div class="pane active" id="overview">
        <div class="prompt-tabs">
          <button class="prompt-tab active" data-prompt="system">system</button>
          <button class="prompt-tab" data-prompt="soul">soul</button>
          <button class="prompt-tab" data-prompt="agent">agent</button>
          <button class="prompt-tab" data-prompt="other">其他</button>
        </div>
        <div class="mono" id="prompt-view">选择用户后加载 system prompt…</div>
      </div>
      <div class="pane" id="debug">
        <div class="debug-grid">
          <div class="toggle-card"><div><b>思考开关</b><p style="color:var(--text-secondary);font-size:11px;margin-top:2px">think</p></div><div class="switch" id="switch-think" onclick="toggleConfigSwitch('think',this)"></div></div>
          <div class="toggle-card"><div><b>流式输出开关</b><p style="color:var(--text-secondary);font-size:11px;margin-top:2px">stream</p></div><div class="switch" id="switch-stream" onclick="toggleConfigSwitch('stream',this)"></div></div>
          <div class="item"><div class="item-top"><b>用户模型设置</b><span class="pill" id="debug-user">—</span></div>
            <div class="debug-grid" style="margin-top:10px">
              <div class="form-row"><label>api 模型</label><input id="cfg-model" onchange="saveConfigField('model',this.value)"></div>
              <div class="form-row"><label>base-url</label><input id="cfg-base-url" placeholder="https://api.deepseek.com" onchange="saveConfigField('base_url',this.value)"></div>
              <div class="form-row"><label>key</label><div class="key-shell"><input id="cfg-key" type="password" placeholder="点击输入密钥，回车保存" readonly onclick="this.readOnly=false;this.value='';this.focus()" onkeydown="if(event.key==='Enter'){event.preventDefault();saveConfigField('api_key',this.value);this.value='';this.readOnly=true;toast('密钥已保存')}"><button class="btn btn-ghost small" onclick="var i=document.getElementById('cfg-key');i.readOnly=false;i.value='';i.focus()">填入</button></div><div class="key-hint">密钥不显示明文，回车后清空并保存</div></div>
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-primary small" style="flex:1" onclick="saveAllConfig()">保存</button>
            <button class="btn btn-ghost small" style="flex:1" onclick="applyConfig()">应用</button>
            <button class="btn btn-ghost small" style="flex:1" onclick="restoreConfig()">恢复</button>
          </div>
        </div>
      </div>
      <div class="pane" id="logs"><div class="list" id="log-list"><div style="color:var(--text-secondary);font-size:12px;padding:4px">选择用户后加载日志…</div></div></div>
      <div class="pane" id="files">
        <div class="file-toolbar">
          <button class="btn btn-ghost small" onclick="loadFileList()">刷新</button>
          <button class="btn btn-danger small" onclick="deleteAllFiles()">全部删除</button>
          <button class="btn btn-ghost small" onclick="deleteCheckedFiles()">批量删除</button>
        </div>
        <div class="list" id="file-list"><div style="color:var(--text-secondary);font-size:12px;padding:4px">选择用户后加载…</div></div>
      </div>
    </div>
  </aside>
</div>
<div class="ctx-menu" id="conv-menu"><button onclick="renameConvFromMenu()">重命名对话</button><button class="danger" onclick="deleteConvFromMenu()">删除对话</button></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================
   votx-agent WebUI — real backend wiring
   ============================================ */

const $ = s => document.querySelector(s);
const chatEl = $("#chat");
const input = $("#user-input");
const sendBtn = $("#send-btn");
let userActive = false;
let currentBlock = null;
let chunkBubble = null;
let selectedConv = null;
let _pendingUsage = null;
let _thinkBlock = null;
let currentFileDir = "file";

// ---- Toast ----
function toast(t) { const el = $("#toast"); el.textContent = t; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2200); }

// ---- Tabs ----
document.querySelectorAll(".tab").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".tab,.pane").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); $("#" + b.dataset.tab).classList.add("active");
}));

// ---- Prompt tabs ----
document.querySelectorAll(".prompt-tab").forEach(b => b.addEventListener("click", () => {
  document.querySelectorAll(".prompt-tab").forEach(x => x.classList.remove("active"));
  b.classList.add("active"); renderPromptPane(b.dataset.prompt);
}));

// ---- Quick chips ----
document.querySelectorAll(".chip").forEach(chip => chip.addEventListener("click", () => {
  if (!userActive) { toast("请先选择用户"); return; }
  sendCommand(chip.dataset.cmd);
}));

// ---- Helpers ----
function setInputLock(v) { sendBtn.disabled = v; input.disabled = v; if (!v) input.focus(); }
function scrollBottom() { chatEl.scrollTop = chatEl.scrollHeight; }
function escHtml(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function formatSize(n) { if (!n) return ""; if (n < 1024) return n + "B"; if (n < 1048576) return (n/1024).toFixed(1)+"KB"; return (n/1048576).toFixed(1)+"MB"; }
function formatTime(ts) { if (!ts) return ""; const d = new Date(ts*1000), now = new Date(), diff = now - d; if (diff < 60000) return "刚刚"; if (diff < 3600000) return Math.floor(diff/60000)+"分钟前"; if (diff < 86400000) return Math.floor(diff/3600000)+"小时前"; return d.toLocaleDateString("zh-CN"); }

function formatContent(text) {
  let segs = [], last = 0, re = /```(\w*)\n?([\s\S]*?)```/g, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) segs.push({ raw: false, t: text.slice(last, m.index) });
    segs.push({ raw: true, t: `<pre><code>${escHtml(m[2])}</code></pre>` });
    last = m.index + m[0].length;
  }
  if (last < text.length) segs.push({ raw: false, t: text.slice(last) });
  let out = "";
  for (const s of segs) {
    if (s.raw) { out += s.t; continue; }
    let t = escHtml(s.t);
    t = t.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    t = t.replace(/`([^`]+)`/g, "<code>$1</code>");
    out += t;
  }
  return out;
}

// ---- User Management ----
async function loadUsers() {
  try {
    const r = await fetch("/api/users");
    const users = await r.json();
    const sel = $("#user-select");
    sel.innerHTML = "";
    users.forEach(u => { const o = document.createElement("option"); o.value = u; o.textContent = u; sel.appendChild(o); });
    if (users.length) sel.value = users[0];
  } catch(e) { $("#select-err").textContent = "加载用户列表失败: " + e.message; }
}

async function selectUser() {
  const user = $("#user-select").value;
  if (!user) return;
  // 自动断开上一个用户
  if (userActive) { await fetch("/api/disconnect", { method: "POST" }); resetUI(); }
  try {
    const r = await fetch("/api/select-user", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({user}) });
    const d = await r.json();
    if (d.error) { $("#select-err").textContent = d.error; return; }
    userActive = true;
    $("#select-err").textContent = "";
    $("#profile-name").textContent = d.user;
    $("#profile-info").textContent = "已连接";
    $("#chat-title").textContent = d.user + " · 对话";
    $("#main-sub").textContent = "输入消息开始对话";
    $("#status-dot").style.display = "";
    chatEl.innerHTML = "";
    input.disabled = false; sendBtn.disabled = false;
    input.focus();
    refreshConversations();
    loadToolLogs();
    loadFileList();
    loadSystemPrompt();
    loadDebugConfig();
    updateStats();
    $("#debug-user").textContent = d.user;
    toast("已连接: " + d.user);
  } catch(e) { $("#select-err").textContent = "连接失败: " + e.message; }
}

async function disconnect() {
  if (!userActive) return;
  await fetch("/api/disconnect", { method: "POST" });
  resetUI();
  toast("已断开连接，摘要已生成");
}

function resetUI() {
  userActive = false;
  $("#health-provider").textContent = "—";
  $("#profile-name").textContent = "未连接";
  $("#profile-info").textContent = "选择用户开始";
  $("#chat-title").textContent = "对话闭环与工具调用";
  $("#main-sub").textContent = "选择用户后开始对话";
  $("#status-dot").style.display = "none";
  $("#model-name").textContent = "—";
  chatEl.innerHTML = "";
  $("#conv-list").innerHTML = '<div style="color:var(--text-secondary);font-size:11px;padding:4px">选择用户后加载…</div>';
  $("#log-list").innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:4px">选择用户后加载日志…</div>';
  $("#file-list").innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:4px">选择用户后加载…</div>';
  $("#prompt-view").textContent = "选择用户后加载 system prompt…";
  systemPromptData = {};
  document.querySelectorAll(".prompt-tab").forEach(x => x.classList.remove("active"));
  document.querySelector(".prompt-tab[data-prompt='system']").classList.add("active");
  input.disabled = true; sendBtn.disabled = true;
  clearAttachChips();
  loadUsers();
}

// ---- Save / New Chat ----
async function saveChat() {
  if (!userActive) return;
  try {
    const r = await fetch("/api/command", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({command: "/archive"}) });
    const d = await r.json();
    toast(d.content || "已保存");
    refreshConversations();
  } catch(e) { toast("保存失败"); }
}

async function newChat() {
  if (!userActive) return;
  try {
    const r = await fetch("/api/command", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({command: "/clear"}) });
    const d = await r.json();
    chatEl.innerHTML = "";
    $("#chat-title").textContent = ($("#profile-name").textContent || "") + " · 新对话";
    appendSysMsg(d.content || "已创建新对话");
    refreshConversations();
    updateStats();
    toast("新对话已创建");
  } catch(e) { toast("创建失败"); }
}

// ---- Conversations ----
async function refreshConversations() {
  if (!userActive) return;
  try {
    const r = await fetch("/api/conversations");
    const convs = await r.json();
    if (!Array.isArray(convs)) return;
    const el = $("#conv-list");
    if (!convs.length) { el.innerHTML = '<div style="color:var(--text-secondary);font-size:11px;padding:4px">暂无历史对话</div>'; return; }
    el.innerHTML = convs.map(c => {
      const label = c.id === "__current__" ? ("★ " + (c.summary || "新对话")) : escHtml(c.label);
      const meta = `${c.msg_count} 条 · ${formatSize(c.size)} · ${formatTime(c.mtime)}`;
      const rawInfo = c.raw_label ? `<p style="font-size:10px;color:var(--text-tertiary);margin-top:2px">${escHtml(c.raw_label)}</p>` : "";
      const cls = c.id === "__current__" ? "conv active" : "conv";
      const dispLabel = c.id === "__current__" ? (c.summary || "新对话") : (c.label || c.raw_label || "");
      return `<div class="${cls}" oncontextmenu="openConvMenu(event,this,'${c.id}')" onclick="if(!event.target.closest('button,span[onclick]'))loadConversation('${c.id}','${escHtml(dispLabel).replace(/'/g, "\\'")}','${c.msg_count}')">
        <div><b>${label}</b><p>${meta}</p>${rawInfo}</div>
        <div class="conv-actions">
          <button class="icon-btn" onclick="event.stopPropagation();renameConv(event,'${c.id}')" title="重命名">✎</button>
          <button class="icon-btn danger" onclick="event.stopPropagation();deleteConversation('${c.id}')" title="删除">×</button>
        </div>
      </div>`;
    }).join("");
  } catch(e) {}
}

async function loadConversation(id, displayName, msgCount) {
  if (!userActive) return;
  if (id === "__current__") { toast("已在当前对话"); return; }
  if (!confirm("加载此对话将替换当前对话（已自动保存），继续？")) return;
  try {
    const r = await fetch("/api/load-conversation", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id}) });
    const d = await r.json();
    if (d.error) { toast("加载失败: " + d.error); return; }
    chatEl.innerHTML = "";
    $("#chat-title").textContent = ($("#profile-name").textContent || "") + " · " + (displayName || (d.msg_count ? "历史对话" : "新对话"));
    appendSysMsg(`已加载对话 (${d.msg_count} 条消息)`);

    // Fetch and render messages
    const mr = await fetch("/api/messages");
    const msgs = await mr.json();
    if (Array.isArray(msgs)) {
      for (const m of msgs) {
        const role = m.role || "";
        const content = m.content || "";
        const toolCalls = m.tool_calls;
        if (role === "system") {
          continue; // 跳过 system prompt
        } else if (role === "user") {
          currentBlock = null; // 新回合
          if (content) addUserMessage(content);
        } else if (role === "assistant") {
          if (toolCalls) {
            for (const tc of toolCalls) {
              const name = tc.function?.name || "unknown";
              let args = {};
              try { args = JSON.parse(tc.function?.arguments || "{}"); } catch(e) {}
              appendTool({name, icon:"🔧", args, elapsed:0, success:true});
            }
          }
          if (content) appendText(content);
        } else if (role === "tool") {
          // 工具结果不单独显示，已合并在 tool_call 卡片中
        }
      }
    }
    currentBlock = null; chunkBubble = null;
    refreshConversations();
    scrollBottom();
    toast("对话已加载");
  } catch(e) { toast("加载失败: " + e.message); }
}

async function deleteConversation(id) {
  if (id === "__current__") { toast("不能删除当前对话"); return; }
  if (!confirm("确认删除此对话？此操作不可撤销。")) return;
  try {
    const r = await fetch("/api/conversations/" + id, { method: "DELETE" });
    const d = await r.json();
    if (d.error) { toast(d.error); return; }
    toast("已删除");
    refreshConversations();
  } catch(e) { toast("删除失败: " + e.message); }
}

async function renameConv(event, id) {
  event.stopPropagation();
  const conv = event.target.closest(".conv");
  const b = conv.querySelector("b");
  const next = prompt("输入新的对话名", b.textContent.replace("★ ", ""));
  if (!next || !next.trim()) return;
  if (id === "__current__") { b.textContent = "★ " + next.trim(); toast("当前对话名已更新"); return; }
  try {
    const r = await fetch(`/api/conversations/${id}/rename`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({name: next.trim()}) });
    const d = await r.json();
    if (d.error) { toast(d.error); return; }
    toast("已重命名");
    refreshConversations();
  } catch(e) { toast("重命名失败: " + e.message); }
}

function openConvMenu(event, conv, id) {
  event.preventDefault();
  selectedConv = {el: conv, id: id};
  const menu = $("#conv-menu");
  menu.style.left = event.clientX + "px";
  menu.style.top = event.clientY + "px";
  menu.style.display = "block";
}

document.addEventListener("click", () => { $("#conv-menu").style.display = "none"; });

function renameConvFromMenu() {
  if (!selectedConv) return;
  renameConv({stopPropagation(){}, target: selectedConv.el.querySelector(".icon-btn")}, selectedConv.id);
}

function deleteConvFromMenu() {
  if (!selectedConv) return;
  deleteConversation(selectedConv.id);
}

async function deleteAllConvs() {
  if (!confirm("删除全部归档对话？此操作不可撤销。")) return;
  try {
    const r = await fetch("/api/conversations", { method: "DELETE" });
    const d = await r.json();
    toast("已删除 " + (d.deleted || 0) + " 个对话");
    refreshConversations();
  } catch(e) { toast("删除失败: " + e.message); }
}

// ---- System Prompt ----
let systemPromptData = {};

async function refreshOverview() {
  const btn = $("#refresh-btn");
  btn.classList.add("spinning");
  try {
    await Promise.all([
      updateStats(),
      loadSystemPrompt(),
      loadDebugConfig(),
      loadToolLogs(),
      loadFileList(),
      refreshConversations(),
    ]);
    toast("已刷新");
  } catch (e) { /* ignore */ }
  setTimeout(() => btn.classList.remove("spinning"), 600);
}

async function loadSystemPrompt() {
  if (!userActive) return;
  try {
    const r = await fetch("/api/system-prompt");
    const d = await r.json();
    if (!d.error && d.content) {
      systemPromptData = {
        system: d.content || "",
        soul: d.soul || "未找到 soul 定义文件",
        agent: d.agent || "未找到 AGENT.md",
        other: d.other || "Skill 摘要、持久记忆等\n\n在完整 prompt 中查看…",
      };
      renderPromptPane("system");
    }
  } catch(e) {}
}

function renderPromptPane(tab) {
  const content = systemPromptData[tab] || systemPromptData.system || "加载中…";
  $("#prompt-view").textContent = content;
}

// ---- Commands ----
async function sendCommand(cmd) {
  const r = await fetch("/api/command", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({command: cmd}) });
  const d = await r.json();
  if (d.retry && d.content) {
    // 真正重生成：后端已移除旧回复，前端先清理旧 UI 再发起流式请求
    removeLastAIReply();
    setInputLock(true);
    currentBlock = createBlock();
    chunkBubble = null;
    streamChat(d.content);
    return;
  }
  appendSysMsg(d.content || "命令已执行");
  if (cmd === "/clear") { chatEl.innerHTML = ""; loadToolLogs(); updateStats(); }
  if (cmd === "/archive" || cmd === "/summarize" || cmd === "/总结") refreshConversations();
  scrollBottom();
}

// ---- Send Message ----
async function sendMessage() {
  const userText = input.value.trim();
  if (!userText || sendBtn.disabled) return;

  // 附上文件引用 - 使用相对路径
  const chips = [...document.querySelectorAll("#attach-chips .attach-chip")];
  const attachPaths = chips.map(c => c.dataset.path || c.dataset.file).filter(Boolean);
  // 保存图片信息用于预览 {name, dir}
  const imageInfos = chips.map(c => ({name: c.dataset.file, dir: c.dataset.dir || "file"})).filter(x => isImageFile(x.name));
  let fullMsg = userText;
  if (attachPaths.length) {
    fullMsg = attachPaths.join("\n") + "\n" + userText;
    clearAttachChips();
  }

  addUserMessage(fullMsg, imageInfos);
  input.value = "";
  setInputLock(true);
  currentBlock = createBlock();
  chunkBubble = null;

  await streamChat(fullMsg);
}

async function streamChat(message) {
  try {
    const r = await fetch("/api/chat", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({message}) });
    const ct = r.headers.get("Content-Type") || "";

    if (ct.includes("application/json")) {
      const d = await r.json();
      if (currentBlock) { currentBlock.remove(); currentBlock = null; }
      appendSysMsg(d.content || d.error || "");
      setInputLock(false);
      return;
    }

    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop() || "";
      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const data = line.slice(6);
          if (data === '{"type":"done"}') continue;
          try { handleEvent(JSON.parse(data)); } catch(e) {}
        }
      }
    }
  } catch(e) { appendError("连接错误: " + e.message); }
  setInputLock(false);
  currentBlock = null;
  chunkBubble = null;
  _pendingUsage = null;
  _thinkBlock = null;
  scrollBottom();
  loadToolLogs();
  loadFileList();
  refreshConversations();
  updateStats();
}

function handleEvent(ev) {
  switch (ev.type) {
    case "tool_call": chunkBubble = null; appendTool(ev); break;
    case "text_chunk": appendChunk(ev.content); break;
    case "text_done":
      if (chunkBubble) { chunkBubble.innerHTML = formatContent(chunkBubble._raw || ""); }
      chunkBubble = null;
      if (_pendingUsage) { appendUsage(_pendingUsage); _pendingUsage = null; }
      break;
    case "text": appendText(ev.content); if (_pendingUsage) { appendUsage(_pendingUsage); _pendingUsage = null; } break;
    case "thinking_chunk": appendThinkingChunk(ev.content); break;
    case "thinking_done": finalizeThinking(); break;
    case "thinking": appendThinking(ev.content); break;
    case "usage": _pendingUsage = ev.data; break;
    case "error": chunkBubble = null; appendError(ev.content); break;
    case "deadlock_warning": appendWarn("同命令连败 3 次，已提示 LLM 换思路"); break;
    case "max_rounds": appendMaxRounds("已达到最大工具调用轮数"); break;
  }
}

function appendChunk(text) {
  if (!currentBlock) currentBlock = createBlock();
  if (!chunkBubble) {
    const wrap = document.createElement("div");
    wrap.className = "bubble-wrap";
    wrap.style.marginTop = "4px";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble._raw = "";
    wrap.appendChild(bubble);
    currentBlock.appendChild(wrap);
    chunkBubble = bubble;
  }
  chunkBubble._raw += text;
  chunkBubble.textContent += text;
  scrollBottom();
}

function removeLastAIReply() {
  // 移除最后一个 AI 回复在 DOM 中的所有痕迹
  const children = [...chatEl.children];
  // 找到最后一个用户消息的位置
  let lastUserIdx = -1;
  for (let i = children.length - 1; i >= 0; i--) {
    if (children[i].classList && children[i].classList.contains("me")) { lastUserIdx = i; break; }
  }
  // 删除其后所有元素 (AI block, tool cards, thinking 等)
  for (let i = children.length - 1; i > lastUserIdx; i--) {
    children[i].remove();
  }
}

function isImageFile(name) {
  return /\.(png|jpe?g|gif|webp|svg|bmp|ico)$/i.test(name);
}

function addUserMessage(text, imageInfos) {
  const d = document.createElement("div");
  d.className = "msg me";
  let previewHtml = "";
  for (const img of (imageInfos || [])) {
    if (!isImageFile(img.name)) continue;
    const dirParam = img.dir && img.dir !== "file" ? "?dir=" + img.dir : "";
    previewHtml += `<img src="/api/files/view/${encodeURIComponent(img.name)}${dirParam}" alt="${escHtml(img.name)}" style="max-width:100%;max-height:260px;border-radius:12px;margin-bottom:6px;display:block" loading="lazy">`;
  }
  d.innerHTML = `<div class="msg-avatar">你</div><div class="bubble-wrap"><div class="bubble">${previewHtml}${escHtml(text)}</div><button class="copy-msg" title="复制" onclick="copyBubble(this)">复制</button></div>`;
  chatEl.appendChild(d);
}

function createBlock() {
  const d = document.createElement("div");
  d.className = "msg";
  d.innerHTML = `<div class="msg-avatar">🤖</div><div style="flex:1;min-width:0"></div>`;
  chatEl.appendChild(d);
  return d.querySelector("div:last-child");
}

function appendTool(ev) {
  const card = document.createElement("div");
  card.className = "tool-call";
  const timeStr = ev.elapsed ? ev.elapsed.toFixed(1) + "s" : "";
  const shortArgs = ev.args ? JSON.stringify(ev.args).slice(0, 80) : "";
  const statusCls = ev.success ? "ok" : "fail";
  card.innerHTML = `<div class="tc-header" onclick="this.parentElement.classList.toggle('open')">
    <span class="tc-name">${escHtml(ev.name)}</span>
    <span class="tc-param">${escHtml(shortArgs)}</span>
    <span class="tc-time">${timeStr}</span>
    <span class="tc-status ${statusCls}">${ev.success ? "OK" : "FAIL"}</span>
  </div>
  <div class="tc-detail"><pre>${escHtml(JSON.stringify(ev.args||{},null,2))}</pre></div>`;
  (currentBlock || chatEl).appendChild(card);
}

function appendText(text) {
  if (!currentBlock) currentBlock = createBlock();
  const wrap = document.createElement("div");
  wrap.className = "bubble-wrap";
  wrap.style.marginTop = "4px";
  wrap.innerHTML = '<div class="bubble">' + formatContent(text) + '</div>';
  currentBlock.appendChild(wrap);
}

function copyBubble(btn) {
  const bubble = btn.parentElement.querySelector(".bubble");
  const text = (bubble?.textContent || "").trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓ 已复制";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "复制"; btn.classList.remove("copied"); }, 1500);
  }).catch(() => {});
}

function copyAIReply(btn) {
  const container = btn.closest(".msg");
  if (!container) return;
  const bubbles = container.querySelectorAll(".bubble");
  const text = [...bubbles].map(b => b.textContent || "").join("\n").trim();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓ 已复制";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "复制"; btn.classList.remove("copied"); }, 1500);
  }).catch(() => {});
}

function appendUsage(data) {
  const d = document.createElement("div");
  d.className = "token-row";
  const cached = data.cached_tokens || 0;
  const totalK = ((data.total_tokens||0) / 1000).toFixed(1);
  const hitRate = data.prompt_tokens ? (cached / data.prompt_tokens * 100).toFixed(1) : "0.0";
  let html = '<div class="token-left">';
  html += `<span>总 ${data.total_tokens||0}</span>`;
  if (cached) html += `<span>命中 ${cached}</span>`;
  html += `<span>命中率 ${hitRate}%</span>`;
  html += `<span>输出 ${data.completion_tokens||0}</span>`;
  html += `<span>耗时 ${((data.elapsed||0)/1000).toFixed(1)}s</span>`;
  html += '</div>';
  html += '<button class="copy-msg" title="复制" onclick="copyAIReply(this)">复制</button>';
  d.innerHTML = html;
  (currentBlock || chatEl).appendChild(d);
}

function appendSysMsg(text) {
  const d = document.createElement("div");
  d.className = "sys-msg";
  d.textContent = text;
  chatEl.appendChild(d);
}

function appendError(text) {
  const d = document.createElement("div");
  d.className = "sys-error";
  d.textContent = "⚠ " + text;
  (currentBlock || chatEl).appendChild(d);
}

function appendWarn(text) {
  const d = document.createElement("div");
  d.className = "sys-warn";
  d.textContent = "⚠ " + text;
  (currentBlock || chatEl).appendChild(d);
}

function appendThinking(content) {
  const d = document.createElement("div");
  d.className = "think-block";
  d.innerHTML = `<div class="think-header" onclick="this.parentElement.classList.toggle('open')">💭 思考过程</div>
    <div class="think-body">${escHtml(content)}</div>`;
  (currentBlock || chatEl).appendChild(d);
  scrollBottom();
}

function appendThinkingChunk(content) {
  if (!_thinkBlock) {
    _thinkBlock = document.createElement("div");
    _thinkBlock.className = "think-block open";
    _thinkBlock.innerHTML = `<div class="think-header" onclick="this.parentElement.classList.toggle('open')">💭 思考过程</div>

function finalizeThinking() {
  if (_thinkBlock) {
    _thinkBlock.classList.remove("open");

    scrollBottom();

}

function appendMaxRounds(text) {
  const d = document.createElement("div");
  d.className = "sys-warn";
  d.style.display = "flex";
  d.style.alignItems = "center";
  d.style.gap = "8px";
  d.innerHTML = `<span>⚠ ${text}</span><button class="btn btn-ghost small" onclick="continueAfterMaxRounds()">继续</button>`;
  (currentBlock || chatEl).appendChild(d);

}

async function continueAfterMaxRounds() {
  if (!userActive) return;
  setInputLock(true);
  currentBlock = createBlock();
  chunkBubble = null;
  await streamChat("继续");
}

// ---- File Attach Chips ----
function addAttachChip(name, path, dir) {
  const container = $("#attach-chips");
  container.style.display = "flex";
  if ([...container.children].some(c => c.dataset.file === name && c.dataset.dir === (dir||"file"))) return;
  const chip = document.createElement("span");
  chip.className = "attach-chip";
  chip.dataset.file = name;
  chip.dataset.path = path || "";
  chip.dataset.dir = dir || "file";
  chip.innerHTML = `↑ ${escHtml(name)}<span class="remove-file" onclick="this.parentElement.remove();if(!$('#attach-chips').children.length)$('#attach-chips').style.display='none'">×</span>`;
  container.appendChild(chip);
}

async function updateStats() {
  if (!userActive) return;
  try {
    const r = await fetch("/api/stats");
    const d = await r.json();
    if (!d.error) {
      $("#stat-msg-count").textContent = (d.msg_count || 0) + " 条";
      $("#stat-tool-count").textContent = (d.tool_count || 0) + " 次";
      $("#stat-file-size").textContent = formatSize(d.file_size || 0);
    }
  } catch(e) {}
}

function clearAttachChips() {
  const container = $("#attach-chips");
  container.innerHTML = "";
  container.style.display = "none";
}

// ---- File Dir ----
// currentFileDir 保留用于上传等场景，但文件列表同时显示两个目录

// ---- File Upload ----
async function uploadFiles(fileList, forceDir) {
  if (!fileList.length || !userActive) return;
  const uploadDir = forceDir || "file";
  const form = new FormData();
  for (const f of fileList) form.append("files", f);
  try {
    const r = await fetch("/api/upload?dir=" + uploadDir, { method: "POST", body: form });
    const d = await r.json();
    if (d.ok && d.files.length) {
      for (const f of d.files) addAttachChip(f.name, f.path, f.dir || uploadDir);
      toast("已上传: " + d.files.map(f => f.name).join(", "));
    }
    loadFileList();
  } catch(e) { toast("上传失败"); }
  document.getElementById("upload-input").value = "";
}

async function loadFileList() {
  if (!userActive) return;
  try {
    // 同时加载两个目录
    const [r1, r2] = await Promise.all([
      fetch("/api/files?dir=file"),
      fetch("/api/files?dir=download"),
    ]);
    const files1 = await r1.json();
    const files2 = await r2.json();
    const uploadFiles = Array.isArray(files1) ? files1 : [];
    const downloadFiles = Array.isArray(files2) ? files2 : [];

    if (!uploadFiles.length && !downloadFiles.length) {
      $("#file-list").innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:4px">暂无文件</div>';
      return;
    }

    const renderDir = (files, label) => {
      if (!files.length) return "";
      return `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-tertiary);padding:6px 0 4px;border-bottom:1px solid var(--glass-border);margin-bottom:6px">${label} (${files.length})</div>`
        + files.map(f => {
          const mtime = f.mtime ? formatTime(f.mtime) : "";
          const fdir = f.dir || "file";
          return `
          <div class="item" data-file="${escHtml(f.path)}" data-name="${escHtml(f.name)}" data-dir="${fdir}">
            <div class="item-top">
              <div class="file-select"><input class="file-check" type="checkbox"><b>${escHtml(f.name)}</b></div>
              <span class="pill">${formatSize(f.size)}${mtime ? " · "+mtime : ""}</span>
            </div>
            <p style="color:var(--text-secondary);font-size:11px;margin-top:4px">${escHtml(f.path)}</p>
            <div class="file-actions">
              <button class="btn btn-ghost small" onclick="guideFile(this)">引用</button>
              <button class="btn btn-ghost small" onclick="downloadFile(this)">下载</button>
              <button class="btn btn-danger small" onclick="deleteFile(this)">删除</button>
            </div>
          </div>`;
        }).join("");
    };

    $("#file-list").innerHTML = renderDir(uploadFiles, "上传文件") + renderDir(downloadFiles, "下载文件");
  } catch(e) {}
}

function downloadFile(btn) {
  const item = btn.closest(".item");
  const name = (item.dataset.name || "").split("/").pop() || item.dataset.file.split("/").pop();
  const dir = item.dataset.dir || "file";
  window.open("/api/files/download/" + encodeURIComponent(name) + "?dir=" + dir, "_blank");
}

function guideFile(btn) {
  const item = btn.closest(".item");
  const path = item.dataset.file || "";
  const name = item.dataset.name || path.split("/").pop();
  const dir = item.dataset.dir || "file";
  addAttachChip(name, path, dir);
  input.focus();
  toast("已引用: " + path);
}

async function deleteFile(btn) {
  const item = btn.closest(".item");
  const path = item.dataset.file || "";
  const dir = item.dataset.dir || "file";
  try {
    const name = path.split("/").pop();
    const r = await fetch("/api/files/" + encodeURIComponent(name) + "?dir=" + dir, { method: "DELETE" });
    const d = await r.json();
    if (d.ok) { item.remove(); toast("文件已删除"); }
    else { toast(d.error || "删除失败"); }
  } catch(e) { toast("删除失败: " + e.message); }
}

async function deleteAllFiles() {
  if (!confirm("删除全部上传和下载文件？此操作不可撤销。")) return;
  try {
    let total = 0;
    for (const dir of ["file", "download"]) {
      const r = await fetch("/api/files?dir=" + dir, { method: "DELETE" });
      const d = await r.json();
      total += (d.deleted || 0);
    }
    $("#file-list").innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:4px">暂无文件</div>';
    toast("已删除 " + total + " 个文件");
  } catch(e) { toast("删除失败: " + e.message); }
}

async function deleteCheckedFiles() {
  const checked = [...document.querySelectorAll("#file-list .file-check:checked")];
  if (!checked.length) { toast("请先勾选要删除的文件"); return; }
  // 按目录分组分别删除
  const groups = {};
  for (const c of checked) {
    const item = c.closest(".item");
    const dir = item.dataset.dir || "file";
    const name = item.dataset.file.split("/").pop();
    if (name) { (groups[dir] ||= []).push(name); }
  }
  let total = 0;
  try {
    for (const [dir, names] of Object.entries(groups)) {
      const r = await fetch("/api/files?dir=" + dir, {
        method: "DELETE",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({files: names}),
      });
      const d = await r.json();
      total += (d.deleted || 0);
    }
    checked.forEach(c => c.closest(".item").remove());
    toast("已批量删除 " + total + " 个文件");
  } catch(e) { toast("删除失败: " + e.message); }
}

// ---- Tool Logs ----
async function loadToolLogs() {
  if (!userActive) return;
  try {
    const r = await fetch("/api/tool-logs");
    const logs = await r.json();
    if (!Array.isArray(logs) || !logs.length) {
      $("#log-list").innerHTML = '<div style="color:var(--text-secondary);font-size:12px;padding:4px">暂无工具调用日志</div>';
      return;
    }
    const recent = logs.slice(-30).reverse();
    $("#log-list").innerHTML = recent.map(l => {
      let ts = "";
      if (l.ts) {
        try { const d = new Date(l.ts); if (!isNaN(d.getTime())) ts = d.toLocaleString("zh-CN"); else ts = String(l.ts).replace("T"," ").slice(0,19); } catch(e) { ts = String(l.ts).replace("T"," ").slice(0,19); }
      }
      const ok = l.success ? "✓" : "✗";
      const args = JSON.stringify(l.args||{}).slice(0,80);
      const cls = l.success ? "" : "fail";
      return `<div class="log-row ${cls}">${ts} ${ok} ${l.tool} ${args}</div>`;
    }).join("");
  } catch(e) {}
}

// ---- Debug / Config ----
async function loadDebugConfig() {
  if (!userActive) return;
  try {
    const r = await fetch("/api/config");
    const cfg = await r.json();
    if (cfg.error) return;
    const p = cfg.provider || {};
    $("#cfg-model").value = p.model || "";
    $("#cfg-base-url").value = p.base_url || "";
    // 重置 switch 状态
    const thinkEl = $("#switch-think");
    const streamEl = $("#switch-stream");
    thinkEl.classList.toggle("on", !!p.think);
    streamEl.classList.toggle("on", !!p.stream);
    $("#model-name").textContent = p.model || "—";
  } catch(e) {}
}

async function saveConfigField(key, value) {
  if (!userActive) return;
  try {
    const body = {};
    body[key] = value;
    await fetch("/api/config", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
    if (key === "model") $("#model-name").textContent = value || "—";
    toast("已保存");
  } catch(e) { toast("保存失败"); }
}

async function toggleConfigSwitch(key, el) {
  if (!userActive) { toast("请先选择用户"); return; }
  el.classList.toggle("on");
  const on = el.classList.contains("on");
  try {
    await fetch("/api/config", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({[key]: on}) });
    // 独立生效：切换后立即同步到provider
    if (key === "think") $("#switch-think").classList.toggle("on", on);
    if (key === "stream") $("#switch-stream").classList.toggle("on", on);
    toast((on ? "已开启 " : "已关闭 ") + key);
  } catch(e) { el.classList.toggle("on"); toast("保存失败"); }
}

// ---- Debug save/apply/restore ----

function snapshotConfig() {
  _lastSavedConfig = {
    model: $("#cfg-model").value || "",
    base_url: $("#cfg-base-url").value || "",
  };
}

async function saveAllConfig() {
  if (!userActive) { toast("请先选择用户"); return; }
  const data = {
    model: $("#cfg-model").value,
    base_url: $("#cfg-base-url").value,
  };
  try {
    await fetch("/api/config", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify(data) });
    snapshotConfig();
    toast("配置已保存");
  } catch(e) { toast("保存失败"); }
}

async function applyConfig() {
  if (!userActive) { toast("请先选择用户"); return; }
  await loadDebugConfig();
  snapshotConfig();
  toast("配置已应用");
}

function restoreConfig() {
  if (!userActive) { toast("请先选择用户"); return; }
  if (!_lastSavedConfig.model && !_lastSavedConfig.base_url) { toast("没有可恢复的保存状态"); return; }
  $("#cfg-model").value = _lastSavedConfig.model || "";
  $("#cfg-base-url").value = _lastSavedConfig.base_url || "";
  toast("已恢复到上次保存状态");
}

// 首次加载配置后拍快照
const _origLoadDebugConfig = loadDebugConfig;
loadDebugConfig = async function() {

// 页面刷新后自动恢复会话
(async function restoreSession() {
  try {
    const r = await fetch("/api/session");
    const s = await r.json();
    if (s.active) {
      userActive = true;
      $("#health-provider").textContent = "ready";
      $("#profile-name").textContent = s.user;
      $("#profile-info").textContent = "已连接";
      $("#chat-title").textContent = s.user + " · 对话";
      $("#main-sub").textContent = "输入消息开始对话";
      $("#status-dot").style.display = "";
      $("#debug-user").textContent = s.user;
      input.disabled = false; sendBtn.disabled = false;
      input.focus();
      // 恢复消息列表
      try {
        const mr = await fetch("/api/messages");
        const msgs = await mr.json();
        if (Array.isArray(msgs) && msgs.length) {
          chatEl.innerHTML = "";
          for (const m of msgs) {
            const role = m.role || "";
            const content = m.content || "";
            const tc = m.tool_calls;
            if (role === "system") continue;
            else if (role === "user") { currentBlock = null; if (content) addUserMessage(content); }
            else if (role === "assistant") {
              if (tc) for (const t of tc) {
                const n = t.function?.name || "unknown";
                let a = {};
                try { a = JSON.parse(t.function?.arguments || "{}"); } catch(e) {}
                appendTool({name:n, icon:"🔧", args:a, elapsed:0, success:true});
              }
              if (content) appendText(content);
            }
          }
          currentBlock = null; chunkBubble = null;
          scrollBottom();
        }
      } catch(e) {}
      refreshConversations();
      loadToolLogs();
      loadFileList();
      loadSystemPrompt();
      loadDebugConfig();
      updateStats();
    }
  } catch(e) {}
})();

// Drag-and-drop
const mainPanel = $("#main-panel");
const dropOverlay = $("#drop-overlay");
let dragCounter = 0;
mainPanel.addEventListener("dragenter", e => { e.preventDefault(); dragCounter++; dropOverlay.style.display = "flex"; });
mainPanel.addEventListener("dragleave", e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.style.display = "none"; } });
mainPanel.addEventListener("dragover", e => { e.preventDefault(); });
mainPanel.addEventListener("drop", e => {
  e.preventDefault(); dragCounter = 0; dropOverlay.style.display = "none";
  if (!userActive) { toast("请先选择用户"); return; }
  if (e.dataTransfer.files.length) uploadFiles(e.dataTransfer.files);
});
